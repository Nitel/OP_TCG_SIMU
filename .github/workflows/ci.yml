name: CI - Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # 3. Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      # 4. Installer les dépendances
      - name: Install dependencies
        run: pnpm install

      # 5. Builder chaque app séparément pour éviter les conflits
      - name: Build client
        run: pnpm --filter ./apps/client build

      - name: Build server
        run: pnpm --filter ./apps/server build

      # 6. Lancer les tests
      - name: Run tests
        run: pnpm test